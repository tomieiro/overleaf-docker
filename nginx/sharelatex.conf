server {
	listen         80;
	server_name    _; # Catch all, see http://nginx.org/en/docs/http/server_names.html

	root /var/www/sharelatex/web/public/;

	location / {
		proxy_pass http://127.0.0.1:3000;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header X-Forwarded-Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_read_timeout 3m;
		proxy_send_timeout 3m;
	}

	location /socket.io {
		proxy_pass http://127.0.0.1:3026;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header X-Forwarded-Host $host;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_read_timeout 3m;
		proxy_send_timeout 3m;
	}

	location /stylesheets {
		expires 1y;
	}

	location /minjs {
		expires 1y;
	}

	location /js {
		expires 1y;
	}

	location ~ ^/project/([A-Za-z0-9_-]+)/user/([0-9a-f]+)/build/([0-9a-f]+-[0-9a-f]+)/output/(.+)$ {
		alias /var/www/sharelatex/services/clsi/output/$1-$2/generated-files/$3/$4;
		add_header X-Content-Type-Options nosniff;
	}

	location ~ ^/project/([A-Za-z0-9_-]+)/build/([0-9a-f]+-[0-9a-f]+)/output/(.+)$ {
		alias /var/www/sharelatex/services/clsi/output/$1/generated-files/$2/$3;
		add_header X-Content-Type-Options nosniff;
	}

	location /img {
		expires 1y;
	}
}
